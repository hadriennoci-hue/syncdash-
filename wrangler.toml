# =============================================================================
# SYNCDASH — Wrangler Configuration (Cloudflare Pages)
# =============================================================================

name = "syncdash"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# -----------------------------------------------------------------------------
# D1 Database binding
# -----------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "syncdash-db"
database_id = "d7471ca2-fe58-4066-a946-367d062e7e95"

# -----------------------------------------------------------------------------
# R2 Bucket — product image storage
# -----------------------------------------------------------------------------
[[r2_buckets]]
binding = "R2_IMAGES"
bucket_name = "syncdash-images"
