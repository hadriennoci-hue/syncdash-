# =============================================================================
# WIZHARD — Wrangler Configuration (Cloudflare Workers via @opennextjs/cloudflare)
# =============================================================================

name = "syncdash"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# -----------------------------------------------------------------------------
# D1 Database binding
# -----------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "syncdash-db"
database_id = "d7471ca2-fe58-4066-a946-367d062e7e95"

# -----------------------------------------------------------------------------
# R2 Bucket — product image storage
# -----------------------------------------------------------------------------
[[r2_buckets]]
binding = "R2_IMAGES"
bucket_name = "syncdash-images"

# -----------------------------------------------------------------------------
# Text environment variables (non-sensitive — safe to commit)
# Secrets (tokens, keys, passwords) are set via Cloudflare dashboard → Secrets
# -----------------------------------------------------------------------------
[vars]
NEXT_PUBLIC_APP_URL                = "https://wizhard.store"
COINCART_URL                       = "https://coincart.store"
COINCART_API_URL                   = "https://coincart-api.hadrien-noci.workers.dev"
SHOPIFY_KOMPUTERZZ_SHOP            = "ikw70s-fr.myshopify.com"
SHOPIFY_TIKTOK_SHOP                = "qanjg5-0h.myshopify.com"
SHOPIFY_TIKTOK_IRELAND_LOCATION_ID = "gid://shopify/Location/77845233826"
R2_PUBLIC_URL                      = "https://images.wizhard.store"
ACER_STORE_SCRAPE_URLS             = "https://store.acer.com/fr-fr/ecrans,https://store.acer.com/fr-fr/peripheriques,https://store.acer.com/fr-fr/accessoires"

[triggers]
crons = ["*/10 * * * *", "0 4 * * *", "0 6 * * *"]
